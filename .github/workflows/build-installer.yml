name: Build installer

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_CONFIGURATION: Release
  DOTNET_VERSION: 10.0.x
  RUNTIME_IDENTIFIER: win-x64

jobs:
  build-installer:
    name: Build Windows installer
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Read app version
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $versionProperty = $props.Project.PropertyGroup |
            Where-Object { $_.Version } |
            Select-Object -First 1

          $version = $versionProperty.Version
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "0.0.0"
          }

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore twincat_mcp.sln

      - name: Build
        run: dotnet build twincat_mcp.sln --configuration $env:BUILD_CONFIGURATION --no-restore

      - name: Test
        run: dotnet test twincat_mcp.sln --configuration $env:BUILD_CONFIGURATION --no-build --verbosity normal

      - name: Publish application
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\publish\$env:RUNTIME_IDENTIFIER"
          if (Test-Path -LiteralPath $publishDir) {
            Remove-Item -LiteralPath $publishDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $publishDir | Out-Null

          dotnet publish TwincatMcp.Tray\TwincatMcp.Tray.csproj `
            --configuration $env:BUILD_CONFIGURATION `
            --runtime $env:RUNTIME_IDENTIFIER `
            --self-contained true `
            --output $publishDir `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false

          $expectedFile = Join-Path $publishDir "TwinCAT XAE Agent Tools.exe"
          if (-not (Test-Path -LiteralPath $expectedFile)) {
            throw "Expected published file was not found: $expectedFile"
          }

          $extraFiles = @(Get-ChildItem -LiteralPath $publishDir -File |
            Where-Object { $_.FullName -ne $expectedFile }
          )
          if ($extraFiles.Count -gt 0) {
            $extraFileList = $extraFiles.FullName -join ", "
            throw "Single-file publish produced unexpected extra files: $extraFileList"
          }

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: |
          $installerDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\installer"
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\publish\$env:RUNTIME_IDENTIFIER"
          New-Item -ItemType Directory -Force -Path $installerDir | Out-Null

          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "ISCC.exe"
          }

          & $iscc installer\TwincatMcp.iss `
            "/DSourceDir=$publishDir" `
            "/DOutputDir=$installerDir" `
            "/DAppVersion=$env:APP_VERSION"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: twincat-xae-agent-tools-installer
          path: artifacts/installer/*.exe
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagName = $env:GITHUB_REF_NAME
          $installerFiles = @(Get-ChildItem artifacts\installer\*.exe)
          if ($installerFiles.Count -eq 0) {
            throw "No installer files were found to upload to the release."
          }

          $assetPaths = $installerFiles | ForEach-Object { $_.FullName }
          gh release view $tagName *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tagName `
              --title "TwinCAT XAE Agent Tools $tagName" `
              --generate-notes `
              --verify-tag
          }

          foreach ($assetPath in $assetPaths) {
            gh release upload $tagName $assetPath --clobber
          }
